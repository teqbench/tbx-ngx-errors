# Thin caller — delegates to the org-wide reusable Release workflow.
# See: https://github.com/teqbench/.github/.github/workflows/release.yml

name: TeqBench Package - Release Workflow

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release:
    uses: teqbench/.github/.github/workflows/release.yml@7de482dbdfad13f3ca7ba3f9be3111d69881c56a # main
    secrets: inherit
