# ─────────────────────────────────────────────────────────────
# Release — Automated Versioning & Changelog
# ─────────────────────────────────────────────────────────────
# Powered by Google's release-please.
#
# How it works:
#   1. You merge a PR from dev → main.
#   2. release-please reads all conventional commits since the
#      last release and determines the version bump:
#        - fix(…)  → patch  (1.0.0 → 1.0.1)
#        - feat(…) → minor  (1.0.0 → 1.1.0)
#        - feat(…)! or BREAKING CHANGE → major (1.0.0 → 2.0.0)
#   3. It opens (or updates) a "Release PR" that:
#        - bumps version in package.json
#        - generates/updates CHANGELOG.md
#   4. When you merge the Release PR, it:
#        - creates a GitHub Release with tag (e.g. v1.1.0)
#        - auto-generates release notes from commits
#
# Uses the teqbench-automation GitHub App so that release PRs
# trigger CI workflows (GITHUB_TOKEN cannot trigger other
# workflows due to GitHub's security policy).
# ─────────────────────────────────────────────────────────────

name: TeqBench Package - Release Workflow

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    name: Release Please
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - id: release
        uses: googleapis/release-please-action@v4
        with:
          target-branch: main
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish to GitHub Packages
    needs: release
    if: needs.release.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://npm.pkg.github.com"
          scope: "@teqbench"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish ./dist
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
