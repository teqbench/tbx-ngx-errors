# Thin caller — delegates to the org-wide reusable Claude Code workflow.
# See: https://github.com/teqbench/.github/.github/workflows/claude.yml
#
# Note: Event triggers and @claude filters must live here because
# reusable workflows only support workflow_call triggers.

name: TeqBench Package - Claude Code Workflow

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]

concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    uses: teqbench/.github/.github/workflows/claude.yml@7de482dbdfad13f3ca7ba3f9be3111d69881c56a # main
    secrets: inherit
