# ─────────────────────────────────────────────────────────────
# Claude Code — AI-Powered Issue & PR Assistance
# ─────────────────────────────────────────────────────────────
# Responds to @claude mentions in:
#   - Issue comments
#   - PR comments
#   - PR review comments
#   - New issues (if body contains @claude)
#
# Prerequisites:
#   1. Install the Claude GitHub App: https://github.com/apps/claude
#   2. Add ANTHROPIC_API_KEY to repo secrets
#
# Usage examples in issues/PRs:
#   @claude implement this feature based on the issue description
#   @claude fix the bug described above
#   @claude review this PR
#   @claude add TypeScript types for the new props
# ─────────────────────────────────────────────────────────────

name: TeqBench Package - Claude Code Workflow

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]

permissions: {}

concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  claude:
    name: Claude Code
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: teqbench

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --max-turns 10
            --allowedTools
            "View,Edit,Write,GlobTool,GrepTool,BatchTool,Bash(git status:*),Bash(git diff:*),Bash(git log:*),Bash(git branch:*),Bash(git show:*),Bash(git checkout:*),Bash(git add:*),Bash(git commit:*),Bash(git push origin:*),Bash(npm run:*),Bash(npm ci:*),Bash(npx:*)"
