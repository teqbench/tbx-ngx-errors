# Thin caller — delegates to the org-wide reusable Sync workflow.
# See: https://github.com/teqbench/.github/.github/workflows/sync.yml

name: TeqBench Package - Sync (Main into Dev) Workflow

on:
  push:
    branches: [main]

concurrency:
  group: sync-${{ github.repository }}
  cancel-in-progress: false

jobs:
  sync:
    uses: teqbench/.github/.github/workflows/sync.yml@7de482dbdfad13f3ca7ba3f9be3111d69881c56a # main
    secrets: inherit
