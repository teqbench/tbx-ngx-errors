name: Dependency Compatibility Check

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check:
    name: Check dependency compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check versions and post status
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // ── Configuration ────────────────────────────────────────────
            // Set EPIC to the tracking issue number for this repo.
            // Create a tracking issue and update this value during SETUP.
            const EPIC = 1;

            // ── npm registry lookup ──────────────────────────────────────
            async function npmLatest(pkg) {
              try {
                const resp = await fetch(
                  `https://registry.npmjs.org/${encodeURIComponent(pkg)}/latest`
                );
                if (!resp.ok) return 'unknown';
                const data = await resp.json();
                return data.version || 'unknown';
              } catch {
                return 'error';
              }
            }

            function semverParts(v) {
              return v.split('.').map(Number);
            }

            function semverGte(version, target) {
              const v = semverParts(version);
              const t = target.split('.').map(Number);
              for (let i = 0; i < 3; i++) {
                if ((v[i] || 0) > (t[i] || 0)) return true;
                if ((v[i] || 0) < (t[i] || 0)) return false;
              }
              return true;
            }

            // ── Status labels ────────────────────────────────────────────
            const RESOLVED   = '✅ Resolved';
            const BLOCKED    = '⏸️ Blocked';
            const ACTION     = '🔄 Action needed';
            const MONITORING = '👀 Monitoring';

            // ── Find sub-issues of the epic ──────────────────────────────
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 50,
            });

            const subIssues = issues.filter(issue =>
              issue.number !== EPIC
              && issue.body
              && issue.body.includes(`Part of #${EPIC}`)
              && issue.body.includes('<!-- dep-compat')
            );

            if (subIssues.length === 0) {
              console.log('No sub-issues with dep-compat metadata found. Skipping.');
              return;
            }

            // ── Parse metadata from each sub-issue ───────────────────────
            function parseMetadata(body) {
              const match = body.match(
                /<!-- dep-compat\n([\s\S]*?)-->/
              );
              if (!match) return null;

              const lines = match[1].trim().split('\n');
              const meta = {};
              for (const line of lines) {
                const [key, ...rest] = line.split(':');
                if (key && rest.length) {
                  meta[key.trim()] = rest.join(':').trim();
                }
              }
              return meta;
            }

            // ── Evaluate each sub-issue ──────────────────────────────────
            const fingerprints = [];
            const rows = [];

            for (const issue of subIssues) {
              const meta = parseMetadata(issue.body);
              if (!meta || !meta.package) {
                console.log(`Skipping #${issue.number}: no valid dep-compat metadata.`);
                continue;
              }

              const pkg = meta.package;
              const resolution = meta.resolution || 'manual';
              const description = meta.description || '';
              const version = await npmLatest(pkg);

              const auxVersions = [];
              if (meta['also-track']) {
                const auxPkgs = meta['also-track'].split(',').map(s => s.trim());
                for (const aux of auxPkgs) {
                  const auxVer = await npmLatest(aux);
                  auxVersions.push(`\`${aux}\`: ${auxVer}`);
                }
              }

              fingerprints.push(`${pkg}=${version}`);

              let status;
              let detail;

              if (resolution.startsWith('semver-gte:')) {
                const target = resolution.replace('semver-gte:', '');
                const met = version !== 'unknown'
                  && version !== 'error'
                  && semverGte(version, target);
                status = met ? MONITORING : BLOCKED;
                detail = [
                  `\`${pkg}\`: ${version} (need ≥ ${target}${met ? ' ✓' : ' ✗'})`,
                  description,
                ].filter(Boolean).join(' — ');

              } else if (resolution.startsWith('semver-major:')) {
                const major = parseInt(resolution.replace('semver-major:', ''), 10);
                const met = version !== 'unknown'
                  && version !== 'error'
                  && semverParts(version)[0] >= major;
                status = met ? RESOLVED : BLOCKED;
                detail = met
                  ? `\`${pkg}\`: ${version} — **v${major} available!** Ready for integration.`
                  : `\`${pkg}\`: ${version} — waiting for v${major}.x. ${description}`;

              } else {
                status = ACTION;
                const parts = [`\`${pkg}\`: ${version}`];
                if (auxVersions.length) parts.push(auxVersions.join(', '));
                if (description) parts.push(description);
                detail = parts.join(' — ');
              }

              rows.push({
                name: `${issue.title} (#${issue.number})`,
                status,
                detail,
              });
            }

            if (rows.length === 0) {
              console.log('No evaluable items found. Skipping.');
              return;
            }

            // ── Compare with last comment to detect changes ──────────────
            const versionFingerprint = fingerprints.join(' ');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: EPIC,
              per_page: 5,
              direction: 'desc',
            });

            const botComment = comments.find(c =>
              c.performed_via_github_app || c.user?.login === 'github-actions[bot]'
            );
            const lastFingerprint = botComment?.body?.match(
              /<!-- versions: (.+) -->/
            )?.[1] || '';

            const changed = versionFingerprint !== lastFingerprint;
            const isManual = context.eventName === 'workflow_dispatch';
            const isMonday = new Date().getUTCDay() === 1;

            if (!changed && !isManual && !isMonday) {
              console.log('No version changes. Next summary on Monday. Skipping.');
              return;
            }

            // ── Build and post comment ───────────────────────────────────
            const date = new Date().toISOString().split('T')[0];
            const trigger = isManual ? ' (manual)' : '';

            const changeNotice = changed
              ? '### 🔔 Version change detected since last check\n\n'
              : '';

            const resolvedCount = rows.filter(
              r => r.status === RESOLVED
            ).length;
            const totalCount = rows.length;
            const summary = resolvedCount === totalCount
              ? '**All items resolved!** Overrides can be removed and blocked tools integrated.'
              : `${resolvedCount}/${totalCount} resolved. ${totalCount - resolvedCount} item(s) still need attention.`;

            const body = [
              `${changeNotice}## Dependency Compatibility — ${date}${trigger}`,
              '',
              summary,
              '',
              '| Item | Status | Detail |',
              '|---|---|---|',
              ...rows.map(r => `| ${r.name} | ${r.status} | ${r.detail} |`),
              '',
              `<!-- versions: ${versionFingerprint} -->`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: EPIC,
              body,
            });

            console.log(`Posted status to #${EPIC} (changed: ${changed})`);
